<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      function App() {
        return (
          <div style={{ textAlign: "center", fontFamily: "Georgia, serif", marginTop: "4rem" }}>
            <h1>Hello World</h1>
            <poem style={{ display: "block", marginTop: "2rem", lineHeight: "2", fontSize: "1.2rem", color: "#555" }}>
              <p>Tvůj smích je světlo, které hřeje,<br />
              tvé oči hvězdy, jež mi září.<br />
              Bez tebe den se prázdný jeví,<br />
              s tebou i bouře v ráj se mění.</p>
              <p style={{ color: "#999", fontSize: "0.9rem" }}>— s láskou, Petr</p>
            </poem>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
